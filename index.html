<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus - Pomodoro Timer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 50%, #0f1428 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
        }
        
        .card {
            background: rgba(15, 20, 40, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(100, 200, 255, 0.2);
            border-radius: 24px;
            padding: 3rem 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4),
                        0 0 60px rgba(100, 200, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .card:hover {
            border-color: rgba(100, 200, 255, 0.4);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4),
                        0 0 80px rgba(100, 200, 255, 0.15);
        }
        
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .title {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #64c8ff 0%, #0096ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        
        .subtitle {
            font-size: 0.9rem;
            color: #888;
            margin-top: 0.5rem;
            font-weight: 400;
        }
        
        .timer-display {
            font-size: 4rem;
            font-weight: 300;
            color: #64c8ff;
            text-align: center;
            margin: 2rem 0;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.3);
        }
        
        .timer-display:hover {
            text-shadow: 0 0 40px rgba(100, 200, 255, 0.6);
        }
        
        .session-type {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            color: #888;
            transition: all 0.3s ease;
        }
        
        .session-type.work {
            color: #ff6b9d;
            text-shadow: 0 0 10px rgba(255, 107, 157, 0.4);
        }
        
        .session-type.break {
            color: #64c8ff;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.4);
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(100, 200, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 2rem;
            border: 1px solid rgba(100, 200, 255, 0.2);
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b9d 0%, #ff5280 100%);
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(255, 107, 157, 0.5);
        }
        
        .progress-fill.break {
            background: linear-gradient(90deg, #64c8ff 0%, #0096ff 100%);
            box-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
        }
        
        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 0.9rem 2rem;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn-start {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff5280 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.3);
        }
        
        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 107, 157, 0.5);
        }
        
        .btn-start:active {
            transform: translateY(0);
        }
        
        .btn-pause {
            background: linear-gradient(135deg, #64c8ff 0%, #0096ff 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(100, 200, 255, 0.3);
        }
        
        .btn-pause:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(100, 200, 255, 0.5);
        }
        
        .btn-pause:active {
            transform: translateY(0);
        }
        
        .btn-reset {
            background: rgba(100, 200, 255, 0.1);
            color: #64c8ff;
            border: 1px solid rgba(100, 200, 255, 0.3);
        }
        
        .btn-reset:hover {
            background: rgba(100, 200, 255, 0.2);
            border-color: rgba(100, 200, 255, 0.6);
            transform: translateY(-2px);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(100, 200, 255, 0.2);
        }
        
        .stat {
            text-align: center;
            padding: 1rem;
            background: rgba(100, 200, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(100, 200, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .stat:hover {
            background: rgba(100, 200, 255, 0.1);
            border-color: rgba(100, 200, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #64c8ff;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.3);
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 0.3rem;
            font-weight: 500;
        }
        
        .settings-group {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(100, 200, 255, 0.2);
        }
        
        .settings-group h3 {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
            font-weight: 600;
        }
        
        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .settings-row label {
            font-size: 0.9rem;
            color: #aaa;
        }
        
        .settings-row input {
            width: 70px;
            padding: 0.6rem 0.8rem;
            background: rgba(100, 200, 255, 0.1);
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: center;
            color: #64c8ff;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .settings-row input:focus {
            outline: none;
            background: rgba(100, 200, 255, 0.2);
            border-color: rgba(100, 200, 255, 0.6);
            box-shadow: 0 0 10px rgba(100, 200, 255, 0.3);
        }
        
        .btn-save {
            width: 100%;
            padding: 0.9rem;
            margin-top: 1rem;
            background: linear-gradient(135deg, #64c8ff 0%, #0096ff 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(100, 200, 255, 0.3);
        }
        
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(100, 200, 255, 0.5);
        }
        
        .btn-save:active {
            transform: translateY(0);
        }
        
        @media (max-width: 480px) {
            .card {
                padding: 2rem 1.5rem;
            }
            
            .timer-display {
                font-size: 2.5rem;
            }
            
            .title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <!-- Header -->
            <div class="header">
                <div class="title">Focus</div>
                <div class="subtitle">Pomodoro Timer</div>
            </div>
            
            <!-- Session Type -->
            <div class="session-type work" id="sessionType">Work Session</div>
            
            <!-- Timer Display -->
            <div class="timer-display" id="timerDisplay">25:00</div>
            
            <!-- Progress Bar -->
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <!-- Controls -->
            <div class="controls">
                <button class="btn btn-start" id="startBtn" onclick="startTimer()">▶ Start</button>
                <button class="btn btn-pause" id="pauseBtn" onclick="pauseTimer()" style="display:none;">⏸ Pause</button>
                <button class="btn btn-reset" onclick="resetTimer()">↻ Reset</button>
            </div>
            
            <!-- Stats -->
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="sessions">0</div>
                    <div class="stat-label">Sessions</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="focusHours">0h</div>
                    <div class="stat-label">Focus Time</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="streak">0</div>
                    <div class="stat-label">Streak 🔥</div>
                </div>
            </div>
            
            <!-- Settings -->
            <div class="settings-group">
                <h3>⚙️ Settings</h3>
                <div class="settings-row">
                    <label>Work (min)</label>
                    <input type="number" id="workInput" value="25" min="1" max="60">
                </div>
                <div class="settings-row">
                    <label>Break (min)</label>
                    <input type="number" id="breakInput" value="5" min="1" max="30">
                </div>
                <button class="btn-save" onclick="saveSettings()">💾 Save</button>
            </div>
        </div>
    </div>
    
    <script>
        let workDuration = 25 * 60;
        let breakDuration = 5 * 60;
        let timeLeft = workDuration;
        let isRunning = false;
        let isWorkSession = true;
        let timerInterval;
        let sessionsCompleted = 0;
        let totalFocusTime = 0;
        let streak = 0;
        
        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timerDisplay').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            const totalTime = isWorkSession ? workDuration : breakDuration;
            const percentage = ((totalTime - timeLeft) / totalTime) * 100;
            document.getElementById('progressFill').style.width = percentage + '%';
            
            updateStats();
        }
        
        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'inline-block';
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateDisplay();
                
                if (timeLeft <= 0) {
                    completeSession();
                }
            }, 1000);
        }
        
        function pauseTimer() {
            isRunning = false;
            clearInterval(timerInterval);
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('startBtn').style.display = 'inline-block';
        }
        
        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            timeLeft = isWorkSession ? workDuration : breakDuration;
            updateDisplay();
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('startBtn').style.display = 'inline-block';
        }
        
        function completeSession() {
            clearInterval(timerInterval);
            isRunning = false;
            
            if (isWorkSession) {
                totalFocusTime += workDuration / 60;
                sessionsCompleted++;
                streak++;
            } else {
                streak = 0;
            }
            
            isWorkSession = !isWorkSession;
            timeLeft = isWorkSession ? workDuration : breakDuration;
            
            updateSessionType();
            updateDisplay();
            
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('startBtn').style.display = 'inline-block';
            
            const message = isWorkSession ? 
                '✓ Break time over. Ready for next session?' : 
                '✓ Great work! Time to take a break.';
            alert(message);
        }
        
        function updateSessionType() {
            const badge = document.getElementById('sessionType');
            const progress = document.getElementById('progressFill');
            
            if (isWorkSession) {
                badge.textContent = 'Work Session';
                badge.className = 'session-type work';
                progress.className = 'progress-fill';
            } else {
                badge.textContent = 'Break Time';
                badge.className = 'session-type break';
                progress.className = 'progress-fill break';
            }
        }
        
        function updateStats() {
            document.getElementById('sessions').textContent = sessionsCompleted;
            document.getElementById('focusHours').textContent = totalFocusTime.toFixed(1) + 'h';
            document.getElementById('streak').textContent = streak;
        }
        
        function saveSettings() {
            const newWork = parseInt(document.getElementById('workInput').value);
            const newBreak = parseInt(document.getElementById('breakInput').value);
            
            if (newWork > 0 && newBreak > 0) {
                workDuration = newWork * 60;
                breakDuration = newBreak * 60;
                resetTimer();
                alert('✓ Settings saved');
            }
        }
        
        updateDisplay();
        updateSessionType();
    </script>
</body>
</html>
